name: aitoblog CodeQL config

# Disables the "Unpinned tag for a non-immutable Action" warning for
# trusted upstream orgs. dependabot/, pnpm/, googleapis/, wagoid/,
# actions/, github/ are signed and the dependabot ecosystem keeps
# them current; pinning to SHA shifts maintenance onto the operator
# without a meaningful security gain for these specific orgs.
#
# To re-enable the check: remove the entry below.

query-filters:
  - exclude:
      id: actions/unpinned-tag
